disabled_rules:
  - line_length
  - file_length
  - type_body_length
  - function_body_length
  - cyclomatic_complexity
  - todo
  - identifier_name
  - trailing_whitespace
  - nesting

opt_in_rules:
  - closure_spacing
  - collection_alignment
  - contains_over_first_not_nil
  - convenience_type
  - empty_count
  - empty_string
  - empty_xctest_method
  - explicit_init
  - first_where
  - force_unwrapping
  - implicit_return
  - last_where
  - operator_usage_whitespace
  - prefer_self_in_static_references
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unused_import
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

excluded:
  - Cinemax.xcodeproj
  - Packages/CinemaxKit/.build
  - .build
  - DerivedData
  - Tests
  - vendor

force_unwrapping:
  severity: warning

force_cast:
  severity: warning

force_try:
  severity: warning
