name: Cinemax
options:
  bundleIdPrefix: com.cinemax
  # 26.2 (not 26.0): SwiftVLC ships a prebuilt libvlc.xcframework built with a
  # 26.2 min-OS. Linking it at 26.0 emits "object file was built for newer iOS
  # version (26.2) than being linked (26.0)" warnings for every libvlc .o.
  # Matching the deployment target to the binary clears them. Bump only when
  # SwiftVLC's binary min-OS changes.
  deploymentTarget:
    iOS: "26.2"
    tvOS: "26.2"
  xcodeVersion: "26.2"
  createIntermediateGroups: true
  groupSortPosition: top
  developmentLanguage: fr
  knownRegions:
    - fr
    - en

packages:
  CinemaxKit:
    path: Packages/CinemaxKit
  # SwiftVLC (libVLC 4.0, Swift 6) is the VLC engine for `VLCStreamPresenter`,
  # which now covers BOTH online streaming (iOS + tvOS) and offline playback
  # (iOS-only, second init). It replaced VLCKitSPM (libVLC 3.x): native iOS Picture-in-Picture
  # (impossible in VLCKit), an object-based track API that fixes the
  # audio-switch silence bug, and Swift-6-native @Observable/@MainActor design.
  # Pinned to 0.3.0 EXACTLY: SwiftVLC >= 0.4.0 declares swift-tools-version 6.3
  # (needs Xcode 26.3+); local toolchain is Swift 6.2.3 / Xcode 26.2. 0.3.0 is
  # the highest tag that is both 6.2-compatible AND ships the PiP API. Bump
  # when the toolchain reaches 6.3.
  SwiftVLC:
    url: https://github.com/harflabs/SwiftVLC
    exactVersion: 0.3.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.3"
    CURRENT_PROJECT_VERSION: "1.0.3"
    # Distribution signing: Xcode auto-creates an "iOS App Store" / "tvOS App
    # Store" provisioning profile on first archive when DEVELOPMENT_TEAM is set
    # below. Override DEVELOPMENT_TEAM per-machine in Xcode (Signing & Capabilities)
    # rather than committing it — open-source friendly.
    CODE_SIGN_STYLE: Automatic

targets:
  Cinemax:
    type: application
    platform: iOS
    sources:
      - path: iOS
      - path: Shared
      - path: Resources
    dependencies:
      - package: CinemaxKit
      - package: SwiftVLC
        product: SwiftVLC
      - target: CinemaxWidget
    entitlements:
      path: iOS/Cinemax.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.cinemax.shared
        # Shared Keychain group so the widget / Top Shelf read the session
        # token from the device-only Keychain instead of plaintext App Group
        # UserDefaults. $(AppIdentifierPrefix) expands to the team id at sign
        # time. Requires "Keychain Sharing" enabled on the App IDs for App
        # Store distribution.
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.cinemax.shared
    info:
      path: iOS/Info.plist
      properties:
        # Team prefix (e.g. "ABCDE12345.") injected at sign time. Read at
        # runtime to build the shared Keychain access group string without
        # hardcoding the team id. Keep in sync across all four targets.
        AppIdentifierPrefix: $(AppIdentifierPrefix)
        # Deep links from the Continue-Watching widget (cinemax://item/{id}).
        CFBundleURLTypes:
          - CFBundleURLName: com.cinemax.deeplink
            CFBundleURLSchemes:
              - cinemax
        # Single-source the version from settings.base (MARKETING_VERSION /
        # CURRENT_PROJECT_VERSION) so a bump is one edit and xcodegen can't
        # clobber it back to its literal defaults on regen.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoadsForMedia: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        # App uses only standard HTTPS encryption — exempt from US export
        # compliance. Auto-answers the App Store Connect questionnaire so we
        # don't have to reconfirm it on every TestFlight upload.
        ITSAppUsesNonExemptEncryption: false
        # `audio` keeps playback alive when the iPhone locks mid-cast — that
        # covers AirPlay too (AirPlay is not its own background mode value;
        # the App Store validator rejects `airplay` as invalid).
        UIBackgroundModes:
          - audio
        UILaunchScreen: {}
        NSSpeechRecognitionUsageDescription: "Cinemax uses speech recognition for voice search to find movies and shows."
        NSMicrophoneUsageDescription: "Cinemax uses the microphone for voice search."
        NSLocalNetworkUsageDescription: "Cinemax uses your local network to automatically discover Jellyfin servers running on your Wi-Fi."
        # Base `UISupportedInterfaceOrientations` is required by the App Store
        # validator (iPad multitasking check) even when iPhone/iPad variants
        # are provided; the variants still override on their device class.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cinemax.ios
        PRODUCT_NAME: Cinemax
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        SUPPORTS_MACCATALYST: NO
        SWIFT_STRICT_CONCURRENCY: complete
    scheme:
      testTargets:
        - CinemaxTests

  CinemaxTV:
    type: application
    platform: tvOS
    sources:
      - path: tvOS
      - path: Shared
      - path: Resources
    dependencies:
      - package: CinemaxKit
      - package: SwiftVLC
        product: SwiftVLC
      - target: CinemaxTopShelf
    entitlements:
      path: tvOS/CinemaxTV.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.cinemax.shared
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.cinemax.shared
    info:
      path: tvOS/Info.plist
      properties:
        # Team prefix injected at sign time — see iOS note. Used to build the
        # shared Keychain access group at runtime.
        AppIdentifierPrefix: $(AppIdentifierPrefix)
        # Deep links from the Top Shelf (cinemax://item/{id}).
        CFBundleURLTypes:
          - CFBundleURLName: com.cinemax.deeplink
            CFBundleURLSchemes:
              - cinemax
        # Single-source the version from settings.base (see iOS note).
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoadsForMedia: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # Standard HTTPS encryption only — exempt from US export compliance.
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "Cinemax uses your local network to automatically discover Jellyfin servers on your Wi-Fi."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cinemax.tvos
        PRODUCT_NAME: CinemaxTV
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_LAUNCHIMAGE_NAME: ""
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_STRICT_CONCURRENCY: complete
    scheme:
      testTargets: []

  # Continue-Watching home-screen widget. Dependency-free by design (no
  # CinemaxKit — widget memory budgets are tight): reads the session snapshot
  # the app publishes via ExtensionSessionBridge and talks to Jellyfin
  # directly (JellyfinLite). Embedded into Cinemax via the target dependency.
  CinemaxWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Widgets/CinemaxWidget
    entitlements:
      path: Widgets/CinemaxWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.cinemax.shared
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.cinemax.shared
    info:
      path: Widgets/Info.plist
      properties:
        # Team prefix injected at sign time — see iOS note. Used to build the
        # shared Keychain access group at runtime.
        AppIdentifierPrefix: $(AppIdentifierPrefix)
        CFBundleDisplayName: Cinemax
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Mirror the app's ATS posture — without it the extension's fetches
        # against a plain-HTTP LAN Jellyfin server are silently blocked and
        # the widget renders empty.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoadsForMedia: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cinemax.ios.widget
        PRODUCT_NAME: CinemaxWidget
        SWIFT_STRICT_CONCURRENCY: complete
        SKIP_INSTALL: YES

  # Apple TV Top Shelf ("Continue Watching" row above the dock icon). Same
  # dependency-free pattern as the widget.
  CinemaxTopShelf:
    type: tv-app-extension
    platform: tvOS
    sources:
      - path: TopShelf/CinemaxTopShelf
    entitlements:
      path: TopShelf/CinemaxTopShelf.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.cinemax.shared
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.cinemax.shared
    info:
      path: TopShelf/Info.plist
      properties:
        # Team prefix injected at sign time — see iOS note. Used to build the
        # shared Keychain access group at runtime.
        AppIdentifierPrefix: $(AppIdentifierPrefix)
        CFBundleDisplayName: Cinemax
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Mirror the app's ATS posture — without it the shelf's resume fetch
        # (and the system's poster loads) against a plain-HTTP LAN Jellyfin
        # server are silently blocked and the Top Shelf falls back to the
        # static image.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSAllowsArbitraryLoadsForMedia: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.tv-top-shelf
          # Plain ObjC name (class is @objc(ContentProvider)) — the
          # module-qualified Swift form resolved to a silent instant exit of
          # the extension process on tvOS 26.
          NSExtensionPrincipalClass: ContentProvider
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cinemax.tvos.topshelf
        PRODUCT_NAME: CinemaxTopShelf
        SWIFT_STRICT_CONCURRENCY: complete
        SKIP_INSTALL: YES
        # Entry-point override: the tv-app-extension product type links
        # `-e _TVExtensionMain`, but that symbol is an empty `ret` stub in the
        # tvOS 26 SIMULATOR runtime — main returns instantly and dyld exits
        # the extension (code 3) before the provider is ever instantiated
        # (verified in lldb). Foundation's generic NSExtensionMain drives the
        # NSExtension lifecycle correctly on both simulator and device.
        OTHER_LDFLAGS: "-e _NSExtensionMain"

  # Both CinemaxKit-internal tests (APICacheTests, PlayMethodTests) and app-layer
  # VM tests live under Tests/CinemaxKitTests/. The natural home for package-
  # internal tests is Packages/CinemaxKit/Tests/, but adding `package: CinemaxKit`
  # as a dependency here causes `Get` (a transitive Nuke dep via jellyfin-sdk-swift)
  # to be double-linked, breaking the build. The app target already embeds the
  # package, so `@testable import CinemaxKit` resolves without re-declaring it.
  # Keep all tests here until the transitive graph allows otherwise.
  CinemaxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/CinemaxKitTests
    dependencies:
      - target: Cinemax
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.cinemax.tests
