name: Cinemax
options:
  bundleIdPrefix: com.cinemax
  deploymentTarget:
    iOS: "18.0"
    tvOS: "18.0"
  xcodeVersion: "26.2"
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  CinemaxKit:
    path: Packages/CinemaxKit

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1

targets:
  Cinemax:
    type: application
    platform: iOS
    sources:
      - path: iOS
      - path: Shared
      - path: Resources
    dependencies:
      - package: CinemaxKit
    info:
      path: iOS/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        NSSpeechRecognitionUsageDescription: "Cinemax uses speech recognition for voice search to find movies and shows."
        NSMicrophoneUsageDescription: "Cinemax uses the microphone for voice search."
        UISupportedInterfaceOrientations~iPad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iPhone:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cinemax.ios
        PRODUCT_NAME: Cinemax
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        SUPPORTS_MACCATALYST: NO
        SWIFT_STRICT_CONCURRENCY: complete
    scheme:
      testTargets:
        - CinemaxTests

  CinemaxTV:
    type: application
    platform: tvOS
    sources:
      - path: tvOS
      - path: Shared
      - path: Resources
    dependencies:
      - package: CinemaxKit
    info:
      path: tvOS/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen: {}
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cinemax.tvos
        PRODUCT_NAME: CinemaxTV
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_STRICT_CONCURRENCY: complete
    scheme:
      testTargets: []

  CinemaxTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/CinemaxKitTests
    dependencies:
      - target: Cinemax
      - package: CinemaxKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.cinemax.tests
