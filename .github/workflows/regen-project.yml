name: Regenerate Xcode project

# Maintenance utility, manual-trigger only: regenerates project.pbxproj with
# the same xcodegen CI uses and exposes it (gzip+base64) in the job log so a
# machine without xcodegen (e.g. a Linux remote session) can commit the
# canonical bytes. Useful whenever files were added from an environment that
# can't run `xcodegen generate` locally.
on:
  workflow_dispatch:
  # Push trigger scoped to this maintenance branch: workflow_dispatch only
  # works once the workflow exists on the default branch, so first use needs
  # a push trigger. Harmless to keep — it only fires on this branch name.
  push:
    branches: [claude/app-audit-security-performance-cbdyqp]

jobs:
  regen:
    name: Generate & export pbxproj
    runs-on: macos-26
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # Pinned to the SAME version as ci.yml (this workflow's whole point is
      # producing the canonical bytes the CI verify step expects) — see the
      # comment in ci.yml for why `brew install` is a per-runner coin flip.
      - name: Install xcodegen
        env:
          XCODEGEN_VERSION: 2.46.0
        run: |
          curl -fsSL -o /tmp/xcodegen.zip "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip"
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen-dist
          echo "/tmp/xcodegen-dist/xcodegen/bin" >> "$GITHUB_PATH"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Export regenerated pbxproj (gzip+base64)
        run: |
          echo "PBXPROJ_B64_BEGIN"
          gzip -9 -c Cinemax.xcodeproj/project.pbxproj | base64
          echo "PBXPROJ_B64_END"
