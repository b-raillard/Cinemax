name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      # Pinned via the official release artifact, NOT `brew install`: the
      # macOS runner pool carries heterogeneous brew caches (2.45.4 and 2.46.0
      # observed pouring on different runners the same day), and xcodegen's
      # output format changes between versions — a floating install turns the
      # pbxproj verify step below into a per-runner coin flip. Bump
      # XCODEGEN_VERSION together with a local `xcodegen generate` (same
      # version) + committed pbxproj, and keep regen-project.yml in sync.
      - name: Install xcodegen
        env:
          XCODEGEN_VERSION: 2.46.0
        run: |
          curl -fsSL -o /tmp/xcodegen.zip "https://github.com/yonaskolb/XcodeGen/releases/download/${XCODEGEN_VERSION}/xcodegen.zip"
          unzip -q /tmp/xcodegen.zip -d /tmp/xcodegen-dist
          echo "/tmp/xcodegen-dist/xcodegen/bin" >> "$GITHUB_PATH"

      - name: Generate Xcode project
        run: xcodegen generate

      # CI builds from the freshly generated project, so a stale committed
      # pbxproj (files added without re-running `xcodegen generate`) would pass
      # CI while breaking every local build that opens the committed project
      # ("Cannot find 'X' in scope" for types that exist). Fail loudly instead
      # so the regenerated file has to ship with the PR.
      - name: Verify committed project.pbxproj is up to date
        run: |
          if ! git diff --exit-code -- Cinemax.xcodeproj/project.pbxproj; then
            echo "::error::Cinemax.xcodeproj/project.pbxproj is stale — run 'xcodegen generate' locally and commit the regenerated project."
            exit 1
          fi

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            .build
          key: spm-${{ runner.os }}-${{ hashFiles('Cinemax.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Packages/CinemaxKit/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build & test (iOS)
        run: |
          set -o pipefail
          xcodebuild test \
            -project Cinemax.xcodeproj \
            -scheme Cinemax \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Build (tvOS)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Cinemax.xcodeproj \
            -scheme CinemaxTV \
            -destination 'platform=tvOS Simulator,name=Apple TV 4K (3rd generation)' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

  lint:
    name: SwiftLint
    runs-on: macos-26
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --strict --quiet
        continue-on-error: true
