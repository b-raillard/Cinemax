name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/SourcePackages
            .build
          key: spm-${{ runner.os }}-${{ hashFiles('Cinemax.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved', 'Packages/CinemaxKit/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Build & test (iOS)
        run: |
          set -o pipefail
          xcodebuild test \
            -project Cinemax.xcodeproj \
            -scheme Cinemax \
            -destination 'platform=iOS Simulator,name=iPhone 17 Pro' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

      - name: Build (tvOS)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Cinemax.xcodeproj \
            -scheme CinemaxTV \
            -destination 'platform=tvOS Simulator,name=Apple TV 4K (3rd generation)' \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            | xcbeautify

  lint:
    name: SwiftLint
    runs-on: macos-26
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint --strict --quiet
        continue-on-error: true
